<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Garden Login</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #080808;
            color: #eeeeee;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
        }
        .login-container {
            max-width: 400px;
            width: 100%;
            background-color: #1e1e1e;
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3);
            text-align: center;
        }
        h2 {margin-bottom: 20px; color: #f3f3f8; }
        .input-group {margin-bottom: 16px; text-align: left;}
        label {display: block; margin-bottom: 6px; font-size: 14px; color: #a1a1a6;}
        input{
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background-color: #2c2c2c;
            color: #fff;
            box-sizing: border-box;
            outline: none;
        }
        input:focus {border-color: #81c784;}
        .btn {
            width: 100%;
            padding: 12px;
            background-color: #81c784;
            color: #121212;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            margin-top: 10px;
        }
        .btn-secondary {
            background-color: transparent;
            color: #81c784;
            border: 1px solid #81c784;
            margin-top: 12px;
        }
        .error-message {
            color: #ff6b6b;
            margin-top: 10px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <h2>join the garden</h2>
        {% if error %}
            <p class ="error-message">{{ error }}</p>
        {% endif %}
        <form method="post">
            <div class="input-group">
                <label for="username">Username:</label>
                <input type="text" id="username" name="username" required autocomplete="off">
            </div>
            <div class="input-group">
                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>
            </div>
            <button type="submit" name = "action" value="login" class="btn">Login</button>
            <button type="submit" name = "action" value="signup" class="btn btn-secondary">Sign up</button>
        </form>
    </div>
</body>
</html>
